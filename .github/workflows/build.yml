name: Build JeffsWebRadio .bin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Récupère le code ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Installe Arduino CLI (action officielle) ──────
      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      # ── 3. Configure Arduino CLI ─────────────────────────
      - name: Configure Arduino CLI
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      # ── 4. Installe le support ESP32 ────────────────────
      - name: Install ESP32 platform
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      # ── 5. Installe les bibliothèques ───────────────────
      - name: Install libraries
        run: |
          arduino-cli lib install "M5Cardputer"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "ArduinoJson"

      # ── 6. Installe ESP8266Audio depuis GitHub ──────────
      - name: Install ESP8266Audio
        run: |
          mkdir -p ~/Arduino/libraries
          git clone --depth=1 \
            https://github.com/earlephilhower/ESP8266Audio.git \
            ~/Arduino/libraries/ESP8266Audio

      # ── 7. Détecte le nom exact du fichier .ino ──────────
      - name: Find sketch file
        run: |
          SKETCH=$(find . -maxdepth 1 -name "*.ino" | head -1)
          echo "Found sketch: $SKETCH"
          echo "SKETCH=$SKETCH" >> $GITHUB_ENV

      # ── 8. Compile le firmware ───────────────────────────
      - name: Compile firmware
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn esp32:esp32:m5stack_cardputer \
            --output-dir ./build \
            ${{ env.SKETCH }}

      # ── 9. Renomme le .bin proprement ───────────────────
      - name: Rename output
        run: |
          find ./build -name "*.bin" ! -name "*.partitions.bin" \
            ! -name "*bootloader*" | head -1 | \
            xargs -I{} cp {} ./build/JeffsWebRadio-v1.0.bin
          echo "Files in build:"
          ls -la ./build/

      # ── 10. Upload le .bin comme artifact ────────────────
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeffsWebRadio-firmware
          path: ./build/JeffsWebRadio-v1.0.bin
          retention-days: 30
