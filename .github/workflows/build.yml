name: Build JeffsWebRadio .bin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      # ── Installe la dernière version ESP32 ──────────────
      - name: Install ESP32 platform
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      # ── Vérifie que le Cardputer est bien présent ───────
      - name: List M5Stack boards
        run: |
          arduino-cli board listall | grep -i cardputer || \
          arduino-cli board listall | grep -i m5stack

      - name: Install libraries
        run: |
          arduino-cli lib install "M5Cardputer"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "ArduinoJson"

      - name: Install ESP8266Audio
        run: |
          mkdir -p ~/Arduino/libraries
          git clone --depth=1 \
            https://github.com/earlephilhower/ESP8266Audio.git \
            ~/Arduino/libraries/ESP8266Audio

      - name: Find sketch file
        run: |
          SKETCH=$(find . -maxdepth 1 -name "*.ino" | head -1)
          echo "Found sketch: $SKETCH"
          echo "SKETCH=$SKETCH" >> $GITHUB_ENV

      # ── Compile avec ESP32S3 Dev Module (compatible Cardputer ADV) ──
      - name: Compile firmware
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3 \
            --build-property "build.flash_size=8MB" \
            --build-property "build.partitions=default_8MB" \
            --output-dir ./build \
            ${{ env.SKETCH }}

      - name: Rename output
        run: |
          find ./build -name "*.bin" ! -name "*.partitions.bin" \
            ! -name "*bootloader*" | head -1 | \
            xargs -I{} cp {} ./build/JeffsWebRadio-v1.0.bin
          ls -la ./build/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeffsWebRadio-firmware
          path: ./build/JeffsWebRadio-v1.0.bin
          retention-days: 30
